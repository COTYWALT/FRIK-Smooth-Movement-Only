[FRIK-SmoothMovement]
#
# ---------------
# Live Reload:
# Any change to this file while the game is running is detected and applied immediately,
# so you can tune the smoothing and see the effect without restarting.
#
# This file is created automatically on first run from the default embedded in the DLL.
# It lives in: Documents\My Games\Fallout4VR\Mods_Config\FRIK-SmoothMovement\

# Vertical (up/down) smoothing. Higher values mask more up/down stutter.
fSmoothingAmount = 5.0
fDamping = 1.0
fStoppingMultiplier = 0.5

# Horizontal smoothing. Higher values mask more horizontal stutter.
fSmoothingAmountHorizontal = 5.0
fDampingHorizontal = 1.0
fStoppingMultiplierHorizontal = 0.5


[Debug]

# The level of log message to output; 2 - info (basic), 1 - debug (more logs), 0 - trace (A LOT of logs)
iLogLevel = 2

# Sets the spdlog output pattern for each normal log message.
# Examples: "%H:%M:%S.%e %l: %v"; "%H:%M:%S %L [%s:%#]: %v"
# Guide: https://github.com/ArthurHub/F4VR-CommonFramework/blob/main/docs/debug-config.md
sLogPattern = %H:%M:%S.%e %l: %v

# Internal use for versioning
iVersion = 1
