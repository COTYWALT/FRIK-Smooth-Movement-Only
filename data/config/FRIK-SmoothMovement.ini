[FRIK-SmoothMovement]

# Vertical (up/down) smoothing. Higher values mask more up/down stutter.
fSmoothingAmount = 5.0
fDamping = 1.0
fStoppingMultiplier = 0.5

# Horizontal smoothing. Higher values mask more horizontal stutter.
fSmoothingAmountHorizontal = 5.0
fDampingHorizontal = 1.0
fStoppingMultiplierHorizontal = 0.5
